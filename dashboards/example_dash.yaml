            data_generator: >
              var siirto = [3.01, 3.01, 3.01, 3.01, 3.01, 3.01, 3.01, 4.92,
              4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92,
              4.92, 4.92, 4.92, 3.01, 3.01 ] ; var alv = 1.255; var marginaali =
              0.0059; return entity.attributes.data.map((d, index) => {
                var tempdate = new Date(d["DateTime"]);
                var hour = tempdate.getHours();
                return [tempdate.getTime(), ((entity.attributes.data[index]["PriceNoTax"]+marginaali)*alv)*100+siirto[hour]];
              });
            color_threshold:
              - value: 0
                color: green
              - value: 20
                color: gold
              - value: 25
                color: orange
              - value: 35
                color: red
              - value: 200
          - entity: sensor.shf_electricity_price_now
            show:
              in_header: false
              header_color_threshold: true
              in_chart: false
            type: line
            color: lightgray
            float_precision: 2
            stroke_width: 0
            data_generator: >
              var siirto = [3.01, 3.01, 3.01, 3.01, 3.01, 3.01, 3.01, 4.92,
              4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92, 4.92,
              4.92, 4.92, 4.92, 3.01, 3.01 ] ; var alv = 1.255;  var marginaali
              = 0.059; var currentTime = new Date().setMinutes(0, 0, 0);

              let currentPrice = entity.attributes.data.find(d => {
                return new Date(d["DateTime"]).getTime() === currentTime;
              })["PriceNoTax"];

              return entity.attributes.data.map((d, index) => {
                var t = new Date();
                return [new Date(d["DateTime"]).getTime(), ((currentPrice+marginaali)*alv)*100 + siirto[t.getHours()]];
              });
            color_threshold:
              - value: 0
                color: green
              - value: 20
                color: gold
              - value: 25
                color: orange
              - value: 35
                color: red
