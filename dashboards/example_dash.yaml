kiosk_mode:
  non_admin_settings:
    kiosk: true
    ignore_entity_settings: true
  entity_settings:
    - entity:
        input_boolean.kiosk_mode: 'on'
      hide_header: true
    - entity:
        input_boolean.kiosk_mode: 'off'
      hide_header: false
views:
  - theme: kibibit-dark-cards
    title: Home
    icon: mdi:home
    type: custom:vertical-layout
    badges: []
    cards:
      - type: custom:state-switch
        entity: group
        states:
          admin:
            type: custom:mushroom-chips-card
            chips:
              - type: menu
              - type: action
                icon_color: light-green
                icon: mdi:arrow-expand-vertical
                tap_action:
                  action: call-service
                  service: input_boolean.toggle
                  data: {}
                  target:
                    entity_id: input_boolean.kiosk_mode
      - type: custom:mushroom-chips-card
        chips:
          - type: alarm-control-panel
            entity: alarm_control_panel.koti_halytin
            content_info: state
            double_tap_action:
              action: more-info
          - type: entity
            entity: lock.etuovi
            content_info: state
            double_tap_action:
              action: call-service
              service: script.etuoven_avaus
              data: {}
              target: {}
            hold_action:
              action: none
            use_entity_picture: false
            icon_color: green
          - type: weather
            entity: weather.koti
            show_conditions: true
            show_temperature: true
            double_tap_action:
              action: navigate
              navigation_path: /lovelace-puhelin/saa
          - type: entity
            entity: sensor.lights_on_count
            icon_color: yellow
            icon: mdi:lightbulb-group
            double_tap_action:
              action: none
            tap_action:
              action: none
            hold_action:
              action: call-service
              service: script.sammuta_valot
              data: {}
              target: {}
          - type: entity
            entity: input_boolean.lomatila
            icon_color: green
            use_entity_picture: false
            double_tap_action:
              action: none
            tap_action:
              action: toggle
            hold_action:
              action: none
            content_info: name
        alignment: center
      - type: custom:mushroom-template-card
        primary: |-
          {% set time = now().hour %}
          {% if (time >= 18) %}
            Hyvää iltaa, {{user}}!
          {% elif (time >= 12) %}
            Hyvää iltapäivää, {{user}}!
          {% elif (time >= 5) %}
            Hyvää huomenta, {{user}}!
          {% else %}
            Heippa, {{user}}!
          {% endif %}
        secondary: ''
        icon: ''
        layout: vertical
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: ''
            secondary: ''
            icon: mdi:lightbulb
            icon_color: yellow
