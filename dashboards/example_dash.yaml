            type: datetime
            labels:
              datetimeFormatter:
                minute: HH:mm
                day: ddd
        all_series_config:
          curve: stepline
          show:
            offset_in_name: true
        header:
          title: Nordpool ennuste c/kWh
          show: true
          show_states: true
          colorize_states: true
        span:
          start: day
        series:
          - entity: sensor.nordpool_kwh_fi_eur_4_10_0
            type: column
            float_precision: 3
            stroke_width: 0
            opacity: 0.2
            fill_raw: 'null'
            unit: ¢/kWh
            name: Nordpool ¢/kWh
            show:
              in_header: false
              legend_value: false
              extremas: false
            data_generator: |
              return [...entity.attributes.raw_today.map((start, index) => {
                        return [new Date(start["start"]).getTime(), entity.attributes.raw_today[index]["value"]*124];
                     }),
                     ...entity.attributes.raw_tomorrow.map((entry) => {
                        return [new Date(entry.start).getTime(), entry.value*124];
                     }),
                     // Add a new entry for the day after tomorrow with a zero value
                     [new Date(new Date().setDate(new Date().getDate() + 2)).setHours(0, 0, 0, 0), 0]
                     ].filter(([timestamp, _]) => {
                         const now = new Date();
                         const endOfDayAfterTomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 3);
                         endOfDayAfterTomorrow.setHours(0, 0, 0, 0); // Set to the beginning of two days after today
                         return timestamp < endOfDayAfterTomorrow.getTime();
                     });
            color: '#aaaaaa'
            color_threshold:
              - value: 0
                color: lime
              - value: 5
                color: green
              - value: 10
                color: orange
              - value: 15
                color: red
              - value: 20
                color: darkred
              - value: 30
                color: black
          - entity: sensor.nordpool_kwh_fi_eur_4_10_0
            type: line
            float_precision: 3
            stroke_width: 2
            opacity: 1
            unit: ¢/kWh
            name: Nordpool ¢/kWh Prediction
            color_threshold:
              - value: 0
                color: dodgerblue
                opacity: 0.6
              - value: 5
                color: dodgerblue
                opacity: 0.8
              - value: 10
                color: skyblue
                opacity: 0.8
              - value: 15
                color: red
                opacity: 0.8
              - value: 20
                color: darkred
                opacity: 0.8
              - value: 30
                color: black
                opacity: 0.8
            show:
              in_header: false
              legend_value: false
              extremas: false
            data_generator: |
              const processData = async () => {
                const response = await fetch('https://raw.githubusercontent.com/vividfog/nordpool-predict-fi/main/deploy/prediction.json');
                const predictionData = await response.json();
                return predictionData.map(([timestamp, value]) => [parseInt(timestamp), value]);
              };
              return processData();
