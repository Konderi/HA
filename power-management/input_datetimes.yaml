# ==========================================
# EXISTING HELPERS (from configuration.yaml)
# ==========================================

device_start_time:
  name: Device Start Time
  has_time: true
  has_date: false

device_end_time:
  name: Device End Time
  has_time: true
  has_date: false

electric_trigger_point:
  name: Electric price trigger
  has_time: true
  has_date: false

# ==========================================
# POWER MANAGEMENT - Luxus Mode Tracking
# ==========================================

boiler_luxus_activated:
  name: "Boiler Luxus Activated Time"
  has_date: true
  has_time: true

# ==========================================
# POWER MANAGEMENT - MH1 Radiator Schedule
# ==========================================

mh1_start_time:
  name: "MH1 Heating Start Time"
  has_date: false
  has_time: true
  initial: "22:00:00"
  icon: mdi:clock-start

mh1_end_time:
  name: "MH1 Heating End Time"
  has_date: false
  has_time: true
  initial: "07:00:00"
  icon: mdi:clock-end
